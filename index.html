<!DOCTYPE html><html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>YouTube Analytics</title><script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script><style>

*{
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#0f172a;
    color:white;
    margin:20px;
}

h1{
    margin-bottom:20px;
}

h2{
    margin-top:30px;
}

.cards{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
    margin-bottom:20px;
}

.card{
    background:linear-gradient(
        135deg,
        #8b5cf6,
        #ec4899
    );
    border-radius:16px;
    padding:20px;
    min-width:220px;
    box-shadow:0 8px 20px rgba(0,0,0,.3);
}

.value{
    font-size:32px;
    font-weight:bold;
    margin-top:5px;
}

.controls{
    margin:20px 0;
}

.controls button{
    background:linear-gradient(
        135deg,
        #8b5cf6,
        #ec4899
    );
    color:white;
    border:none;
    padding:10px 16px;
    border-radius:10px;
    cursor:pointer;
    margin-right:10px;
}

.controls button:hover{
    opacity:.9;
}

.chart{
    width:100%;
    height:400px;
    background:#1e293b;
    border-radius:16px;
    margin-bottom:25px;
}

#dateFilter{
    padding:10px;
    border:none;
    border-radius:10px;
    margin-bottom:15px;
}

table{
    width:100%;
    border-collapse:collapse;
    background:#1e293b;
    border-radius:12px;
    overflow:hidden;
}

th{
    background:#8b5cf6;
    color:white;
    padding:12px;
    text-align:left;
}

td{
    padding:10px;
    border-top:1px solid #334155;
}

tr:hover{
    background:#273449;
}

.footer{
    margin-top:20px;
    color:#94a3b8;
    font-size:14px;
}

</style></head><body><h1>📊 YouTube Analytics</h1><div class="cards"><div class="card">
    <div>👁 Просмотры</div>
    <div id="views" class="value">0</div>
</div>

<div class="card">
    <div>👍 Лайки</div>
    <div id="likes" class="value">0</div>
</div>

<div class="card">
    <div>💬 Комментарии</div>
    <div id="comments" class="value">0</div>
</div>

</div><div class="controls"><button onclick="switchMode('total')">
    Общие
</button>

<button onclick="switchMode('plus')">
    Приросты
</button>

</div><h2>👁 Просмотры</h2>
<div id="viewsChart" class="chart"></div><h2>👍 Лайки</h2>
<div id="likesChart" class="chart"></div><h2>💬 Комментарии</h2>
<div id="commentsChart" class="chart"></div><h2>📋 История</h2><input
type="date"
id="dateFilter"
onchange="renderTable()">

<table id="statsTable"><thead>
    <tr>
        <th>Дата</th>
        <th>Просмотры</th>
        <th>Лайки</th>
        <th>Комментарии</th>
        <th>+ Просмотры</th>
        <th>+ Лайки</th>
        <th>+ Комментарии</th>
    </tr>
</thead>

<tbody></tbody>

</table><div class="footer">
    Обновление автоматически каждые 60 секунд
</div><script src="app.js"></script></body>
</html>
