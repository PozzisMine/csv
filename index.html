<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>YouTube Stats</title>

<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>

<style>

body{
    font-family:Arial,sans-serif;
    background:#111827;
    color:white;
    margin:20px;
}

h1{
    margin-bottom:20px;
}

.cards{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
    margin-bottom:20px;
}

.card{
    background:#1f2937;
    border-radius:12px;
    padding:15px;
    min-width:200px;
}

.value{
    font-size:32px;
    font-weight:bold;
}

.plus{
    color:#f472b6;
    margin-top:5px;
}

.controls{
    margin:20px 0;
}

button{
    background:#9333ea;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:8px;
    cursor:pointer;
}

.chart{
    width:100%;
    height:400px;
    background:#1f2937;
    border-radius:12px;
    margin-bottom:25px;
}

</style>
</head>

<body>

<h1>YouTube Stats</h1>

<div class="cards">

    <div class="card">
        <div>👁 Просмотры</div>
        <div id="views" class="value">0</div>
        <div id="viewsPlus" class="plus">📈 +0</div>
    </div>

    <div class="card">
        <div>👍 Лайки</div>
        <div id="likes" class="value">0</div>
        <div id="likesPlus" class="plus">📈 +0</div>
    </div>

    <div class="card">
        <div>💬 Комментарии</div>
        <div id="comments" class="value">0</div>
        <div id="commentsPlus" class="plus">📈 +0</div>
    </div>

</div>

<div class="controls">

    <button onclick="switchMode('total')">
        Общие
    </button>

    <button onclick="switchMode('plus')">
        Приросты
    </button>

</div>

<h2>Просмотры</h2>
<div id="viewsChart" class="chart"></div>

<h2>Лайки</h2>
<div id="likesChart" class="chart"></div>

<h2>Комментарии</h2>
<div id="commentsChart" class="chart"></div>

<script src="app.js"></script>

</body>
</html>
