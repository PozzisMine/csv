<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>YouTube Stats</title>

<script src="https://cdn.jsdelivr.net/npm/echarts/dist/echarts.min.js"></script>

<style>

body{
    font-family:Arial,sans-serif;
    margin:20px;
}

.cards{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
}

.card{
    border:1px solid #ddd;
    border-radius:10px;
    padding:15px;
    min-width:200px;
}

.value{
    font-size:32px;
    font-weight:bold;
}

#viewsChart{
    width:100%;
    height:450px;
    margin-top:30px;
}

</style>

</head>
<body>

<h1>YouTube Stats</h1>

<div class="cards">

    <div class="card">
        <div>👁 Просмотры</div>
        <div id="views" class="value">...</div>
    </div>

    <div class="card">
        <div>👍 Лайки</div>
        <div id="likes" class="value">...</div>
    </div>

    <div class="card">
        <div>💬 Комментарии</div>
        <div id="comments" class="value">...</div>
    </div>

</div>

<h2>График просмотров</h2>

<div id="viewsChart"></div>

<script src="app.js"></script>

</body>
</html>
