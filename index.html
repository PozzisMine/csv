<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>YouTube Stats</title>

<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>

<style>

body{
    font-family:Arial,sans-serif;
    margin:20px;
    background:#f5f5f5;
}

h1{
    margin-bottom:20px;
}

.cards{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
    margin-bottom:20px;
}

.card{
    background:white;
    border-radius:12px;
    padding:15px;
    min-width:200px;
    box-shadow:0 2px 5px rgba(0,0,0,.1);
}

.value{
    font-size:32px;
    font-weight:bold;
}

.controls{
    margin:20px 0;
}

.controls button{
    padding:10px 15px;
    margin-right:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

.chart{
    width:100%;
    height:400px;
    background:white;
    border-radius:12px;
    box-shadow:0 2px 5px rgba(0,0,0,.1);
    margin-bottom:25px;
}

</style>

</head>

<body>

<h1>YouTube Stats</h1>

<div class="cards">

    <div class="card">
        <div>👁 Просмотры</div>
        <div id="views" class="value">...</div>
    </div>

    <div class="card">
        <div>👍 Лайки</div>
        <div id="likes" class="value">...</div>
    </div>

    <div class="card">
        <div>💬 Комментарии</div>
        <div id="comments" class="value">...</div>
    </div>

</div>

<div class="controls">

    <button onclick="switchMode('total')">
        Общие
    </button>

    <button onclick="switchMode('plus')">
        Приросты
    </button>

</div>

<h2>Просмотры</h2>
<div id="viewsChart" class="chart"></div>

<h2>Лайки</h2>
<div id="likesChart" class="chart"></div>

<h2>Комментарии</h2>
<div id="commentsChart" class="chart"></div>

<script src="app.js"></script>

</body>
</html>
